# NATS server config — Onda 1 P4 (account isolation)
# 2026-05-04 (revisado 2026-05-05 apos NATS recusar 'accounts { $G { ... } }'
# como sintaxe — $G e a global account default e nao pode ser declarada
# explicitamente; 'authorization { users: ... }' top-level e o caminho
# idiomatico pra 2 users no mesmo account com permissions distintas).
#
# Estrategia: 2 users no $G (implicito) com permissions distintas:
#   - BACKEND user: full access (publica/subscreve qualquer subject).
#                   Usado pelo backend FastAPI pra emitir comandos e
#                   ler acks/stats.
#   - AGENT user:   scoped — so publica em dns.commands.*.ack + dns.stats.*
#                   e subscreve dns.commands.* (+ _INBOX.>). Usado pelos
#                   agentes em todos os hosts.
#
# Antes (Onda 1 P3): 1 user unico compartilhado, qualquer agente
# comprometido podia publicar dns.commands.<outro_host> falsificando
# comandos pra outros agentes. Agora: agente NAO pode injetar comandos —
# so o backend pode (e o backend ja tem audit chain pra rastrear).
#
# As 4 vars ($NATS_BACKEND_USER, $NATS_BACKEND_PASS, $NATS_AGENT_USER,
# $NATS_AGENT_PASS) vem do environment via interpolacao do nats-server.

server_name: "infra-vision-nats"
http_port: 8222

jetstream {
  store_dir: "/data"
}

# Onda 1 P5: WebSocket pra agentes externos via wss://nats.<dominio>/ws
# (nginx faz TLS terminate; aqui plaintext interno).
# Plain TCP em :4222 mantido pro compat com agentes legacy. Quando todos
# migrarem pra wss, remover -p 4222:4222 do compose.
websocket {
  port: 8080
  no_tls: true
  same_origin: false
  compression: true
  handshake_timeout: "5s"
}

# Users no $G (default account, implicito). NAO declarar 'accounts { $G ... }'
# — NATS rejeita "$G is a Reserved Account".
authorization {
  users: [
    # Backend: full access. Pode publicar dns.commands.<host> (emitir comando)
    # e subscrever dns.commands.*.ack + dns.stats.* (receber respostas).
    { user: $NATS_BACKEND_USER, password: $NATS_BACKEND_PASS }

    # Agente: permissions restritas.
    #
    # Pode PUBLICAR em:
    #   - dns.commands.*.ack         -> ack do comando que recebeu
    #   - dns.stats.*                -> stats DNS do proprio host
    #   - $JS.API.STREAM.NAMES       -> listar streams (init do JS subscribe)
    #   - $JS.API.STREAM.INFO.>      -> info do stream (read-only)
    #   - $JS.API.CONSUMER.>         -> criar/info/delete do proprio durable
    #   - $JS.ACK.>                  -> ack de mensagens JetStream
    #
    # NAO pode publicar (= comandos negados):
    #   - dns.commands.<host>        -> sequestro de comando
    #   - $JS.API.STREAM.CREATE.>    -> criar streams (so backend admin)
    #   - $JS.API.STREAM.DELETE.>    -> deletar stream COMMANDS (DoS)
    #   - $JS.API.STREAM.PURGE.>     -> purge stream (DoS)
    #
    # Subscribe coberto:
    #   - dns.commands.*             -> recebe comandos do backend
    #   - _INBOX.>                   -> request/reply NATS
    #
    # Protecao per-host (agente A nao pode falsificar ack pelo agente B)
    # fica pra P4b futuro — exige creds distintas por agente.
    { user: $NATS_AGENT_USER, password: $NATS_AGENT_PASS,
      permissions: {
        publish: {
          allow: [
            "dns.commands.*.ack",
            "dns.stats.*",
            "$JS.API.STREAM.NAMES",
            "$JS.API.STREAM.INFO.>",
            "$JS.API.CONSUMER.>",
            "$JS.ACK.>"
          ]
        }
        subscribe: { allow: ["dns.commands.*", "_INBOX.>"] }
      }
    }
  ]
}
