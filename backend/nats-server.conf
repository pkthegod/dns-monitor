# NATS server config — Onda 1 P4 (account isolation)
# 2026-05-04
#
# Estrategia: single $G account, 2 users com permissions distintas:
#   - BACKEND user: full access (publica/subscreve qualquer subject).
#                   Usado pelo backend FastAPI pra emitir comandos e
#                   ler acks/stats.
#   - AGENT user:   scoped — so publica em dns.commands.*.ack + dns.stats.*
#                   e subscreve dns.commands.* (+ _INBOX.>). Usado pelos
#                   agentes em todos os hosts (creds compartilhadas; per-host
#                   scoping fica pra P4b futuro).
#
# Antes (Onda 1 P3): 1 user unico compartilhado, qualquer agente
# comprometido podia publicar dns.commands.<outro_host> falsificando
# comandos pra outros agentes. Agora: agente NAO pode injetar comandos —
# so o backend pode (e o backend ja tem audit chain pra rastrear).
#
# Todas as 4 vars ($NATS_BACKEND_USER, $NATS_BACKEND_PASS, $NATS_AGENT_USER,
# $NATS_AGENT_PASS) vem do environment via interpolacao do nats-server.
# Migration de deploy existente: ver .env.example secao NATS.

server_name: "infra-vision-nats"
http_port: 8222

jetstream {
  store_dir: "/data"
}

accounts {
  $SYS {
    users: [
      { user: $NATS_BACKEND_USER, password: $NATS_BACKEND_PASS }
    ]
  }
  $G {
    jetstream: enabled
    users: [
      # Backend: full access dentro de $G (pode publicar dns.commands.<host>
      # pra emitir comando, subscrever dns.commands.*.ack e dns.stats.*).
      { user: $NATS_BACKEND_USER, password: $NATS_BACKEND_PASS }

      # Agente: permissions restritas. So pode publicar em ack do comando
      # que recebeu (qualquer hostname — proteção per-host vira na P4b)
      # e em stats. Subscreve comandos vindos do backend + _INBOX (uso
      # interno NATS pra request/reply).
      # NAO pode publicar dns.commands.<host> = nao consegue sequestrar
      # comando alheio.
      { user: $NATS_AGENT_USER, password: $NATS_AGENT_PASS,
        permissions: {
          publish: { allow: ["dns.commands.*.ack", "dns.stats.*"] }
          subscribe: { allow: ["dns.commands.*", "_INBOX.>"] }
        }
      }
    ]
  }
}
