apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb-dns
    url: 172.20.0.10:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database:         ${POSTGRES_DB}
      sslmode:          disable
      maxOpenConns:     10
      maxIdleConns:     5
      connMaxLifetime:  14400
      postgresVersion:  1500
      timescaledb:      true
    editable: false
