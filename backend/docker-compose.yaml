networks:
  infra_vision_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  # ─────────────────────────────────────────────
  # TimescaleDB (PostgreSQL 15 + TimescaleDB 2.x)
  # ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.25.2-pg15
    container_name: infra_vision_db
    restart: unless-stopped
    networks:
      infra_vision_net:
        ipv4_address: 172.20.0.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnsmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-dns_monitor}
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnsmonitor} -d ${POSTGRES_DB:-dns_monitor}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend FastAPI
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra_vision_api
    restart: unless-stopped
    # SEC: hardening — sem novos privilegios, capabilities reduzidas, FS read-only
    # com tmpfs onde precisamos escrever (PDFs em memoria, tempfiles do reportlab).
    # Limites de recurso pra evitar starvation se um endpoint travar.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      infra_vision_net:
        ipv4_address: 172.20.0.11
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dnsmonitor}:${POSTGRES_PASSWORD}@172.20.0.10:5432/${POSTGRES_DB:-dns_monitor}
      AGENT_TOKEN: ${AGENT_TOKEN:?Defina AGENT_TOKEN no .env}
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TZ: America/Sao_Paulo
      # Thresholds (opcionais — os defaults já são sensatos)
      THRESH_CPU_WARNING: ${THRESH_CPU_WARNING:-80}
      THRESH_CPU_CRITICAL: ${THRESH_CPU_CRITICAL:-95}
      THRESH_RAM_WARNING: ${THRESH_RAM_WARNING:-85}
      THRESH_RAM_CRITICAL: ${THRESH_RAM_CRITICAL:-95}
      THRESH_DISK_WARNING: ${THRESH_DISK_WARNING:-80}
      THRESH_DISK_CRITICAL: ${THRESH_DISK_CRITICAL:-90}
      THRESH_DNS_LATENCY_WARNING: ${THRESH_DNS_LATENCY_WARNING:-200}
      THRESH_DNS_LATENCY_CRITICAL: ${THRESH_DNS_LATENCY_CRITICAL:-1000}
      THRESH_OFFLINE_MINUTES: ${THRESH_OFFLINE_MINUTES:-10}
      NATS_URL: nats://172.20.0.13:4222
      # Onda 1 P4: backend usa BACKEND user (full access). Fallback NATS_USER
      # mantido pra deploy legado que ainda nao migrou as 4 vars novas.
      NATS_BACKEND_USER: ${NATS_BACKEND_USER:-${NATS_USER:-dnsmonitor}}
      NATS_BACKEND_PASS: ${NATS_BACKEND_PASS:-${NATS_PASS:-}}
      NATS_USER: ${NATS_USER:-dnsmonitor}
      NATS_PASS: ${NATS_PASS:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      CLIENT_SESSION_SECRET: ${CLIENT_SESSION_SECRET:-}
      DB_SSL: ${DB_SSL:-disable}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      AGENT_FILE_PATH: /app/agent/dns_agent.py
      SECURITY_ENABLED: ${SECURITY_ENABLED:-true}
      SECURITY_WHITELIST: ${SECURITY_WHITELIST:-}
      ADMIN_BEARER_ALLOWED_IPS: ${ADMIN_BEARER_ALLOWED_IPS:-}
      ADMIN_BEARER_DISABLED: ${ADMIN_BEARER_DISABLED:-}
      INFRA_VISION_ENV: ${INFRA_VISION_ENV:-}
      # Onda 1 P1: proxy reverso (nginx + Cloudflare)
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      # Onda 1 P2: hosts autorizados em CSRF (sem schema, separados por virgula)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # Onda 2 SEC-2.3: HTTPS pro geolocate (opt-in via plano pago ip-api.com)
      IPAPI_KEY: ${IPAPI_KEY:-}
    volumes:
      # SEC/OPS: bind mount de DIRETORIO (nao de arquivo unico).
      # Bind mount de file unico amarra no inode original — quando `cp -a`
      # substitui o arquivo no host (cria novo inode), o container continua
      # vendo o conteudo antigo ate ser recreado com --force-recreate.
      # Bind mount de diretorio segue o path: cp -a no host e visto
      # imediatamente no container, sem restart.
      # Container so enxerga arquivos que estiverem em /opt/dns-monitor/agent/
      # (hoje so dns_agent.py — pedido pelo AGENT_FILE_PATH).
      - ../agent:/app/agent:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # NATS (message broker + JetStream)
  # ─────────────────────────────────────────────
  # Onda 1 P4: lê config externa em vez de --user/--pass na CLI.
  # nats-server.conf define 2 users no $G account (BACKEND full + AGENT
  # scoped). Migration suave: se NATS_BACKEND_USER/PASS nao setado,
  # cai pra NATS_USER/PASS legacy — agentes em prod continuam funcionando.
  nats:
    image: nats:2.10-alpine
    container_name: infra_vision_nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      NATS_BACKEND_USER: ${NATS_BACKEND_USER:-${NATS_USER:-dnsmonitor-backend}}
      NATS_BACKEND_PASS: ${NATS_BACKEND_PASS:-${NATS_PASS:?Defina NATS_BACKEND_PASS ou NATS_PASS no .env}}
      NATS_AGENT_USER: ${NATS_AGENT_USER:-${NATS_USER:-dnsmonitor}}
      NATS_AGENT_PASS: ${NATS_AGENT_PASS:-${NATS_PASS:?Defina NATS_AGENT_PASS ou NATS_PASS no .env}}
    networks:
      infra_vision_net:
        ipv4_address: 172.20.0.13
    ports:
      # 4222 (plain TCP) e 8222 (monitor) ainda expostos pro compat com
      # agentes legacy. Onda 1 P5 final: remover apos todos migrarem
      # pra wss:// via nginx + CF.
      - "4222:4222"
      - "8222:8222"
      # WebSocket port — bind 127.0.0.1 only; nginx do host faz proxy
      # /ws -> 127.0.0.1:8080 -> NATS. Cobre TLS termination via CF
      # Origin Cert no nginx. Agentes externos conectam via:
      #   wss://nats.<dominio>/ws
      - "127.0.0.1:8080:8080"
    volumes:
      - nats_data:/data
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro

volumes:
  pgdata:
  nats_data:
