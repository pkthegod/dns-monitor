<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <circle cx="120" cy="120" r="112" fill="#0a0d14" stroke="#1a1f2e" stroke-width="2.5"/>

  <!-- Outer ring — radar/scan -->
  <circle cx="120" cy="120" r="88" fill="none" stroke="#1c2544" stroke-width="1.5"/>
  <circle cx="120" cy="120" r="72" fill="none" stroke="#1c2544" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Infrastructure layers (3 horizontal bars) -->
  <rect x="76" y="100" width="88" height="6" rx="3" fill="#1e293b" stroke="#334155" stroke-width=".8"/>
  <rect x="82" y="114" width="76" height="6" rx="3" fill="#1e293b" stroke="#334155" stroke-width=".8"/>
  <rect x="88" y="128" width="64" height="6" rx="3" fill="#1e293b" stroke="#334155" stroke-width=".8"/>

  <!-- Active indicators on layers -->
  <circle cx="84" cy="103" r="2.2" fill="#9ece6a"/>
  <circle cx="90" cy="117" r="2.2" fill="#7aa2f7"/>
  <circle cx="96" cy="131" r="2.2" fill="#73daca"/>

  <!-- Eye shape — outer (the Vision) -->
  <path d="M44 120 C44 120 76 72 120 72 C164 72 196 120 196 120 C196 120 164 168 120 168 C76 168 44 120 44 120 Z"
        fill="none" stroke="#7aa2f7" stroke-width="3" stroke-linejoin="round" opacity=".9"/>

  <!-- Eye — inner iris -->
  <circle cx="120" cy="120" r="28" fill="#0c1629" stroke="#7aa2f7" stroke-width="2.5"/>
  <circle cx="120" cy="120" r="16" fill="#1a3a6b" stroke="#3b7cf7" stroke-width="1.5"/>

  <!-- Pupil — monitoring node -->
  <circle cx="120" cy="120" r="7" fill="#7aa2f7"/>
  <circle cx="120" cy="120" r="3.5" fill="#c8daf7"/>

  <!-- Scan line (vertical sweep) -->
  <line x1="120" y1="80" x2="120" y2="92" stroke="#73daca" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  <line x1="120" y1="148" x2="120" y2="160" stroke="#73daca" stroke-width="2" stroke-linecap="round" opacity=".7"/>

  <!-- Corner data points -->
  <circle cx="60" cy="98" r="3" fill="#9ece6a" opacity=".6"/>
  <circle cx="180" cy="98" r="3" fill="#9ece6a" opacity=".6"/>
  <circle cx="60" cy="142" r="3" fill="#73daca" opacity=".6"/>
  <circle cx="180" cy="142" r="3" fill="#73daca" opacity=".6"/>

  <!-- Pulse line at bottom -->
  <path d="M72 180 L96 180 L104 170 L112 190 L120 174 L128 186 L136 180 L168 180"
        stroke="#9ece6a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".8"/>

  <!-- Text: IV monogram subtle -->
  <text x="120" y="208" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#4a5568" letter-spacing="4">INFRA-VISION</text>
</svg>
