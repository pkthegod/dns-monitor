<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Monitor — Login</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; }

  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 44px 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  .login-card h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .login-card p { font-size: .85rem; color: var(--text-dim); margin-bottom: 28px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: .78rem; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .field input { width: 100%; font-family: var(--font); }
  .btn-login { width: 100%; margin-top: 8px; padding: 11px; font-size: .9rem; }
  .error-msg {
    background: #f7768e11;
    border: 1px solid #f7768e44;
    border-radius: 6px;
    color: var(--red);
    padding: 8px 12px;
    font-size: .82rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card scale-in">
  <img src="/static/logo.svg" alt="" style="height:56px;width:56px;margin-bottom:20px;opacity:.9">
  <h1>DNS Monitor</h1>
  <p>Painel de administracao</p>
  <div class="error-msg" id="error-msg"></div>
  <form method="POST" action="/admin/login">
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-login">Entrar</button>
  </form>
</div>
<script src="/static/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    const el = document.getElementById('error-msg');
    el.textContent = 'Credenciais invalidas.';
    el.style.display = 'block';
  }
</script>
</body>
</html>
