<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Monitor — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #151820;
    border: 1px solid #2d3748;
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .login-card h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #f8fafc;
    margin-bottom: 8px;
  }
  .login-card p {
    font-size: .82rem;
    color: #64748b;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: .78rem;
    color: #64748b;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3748;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: .9rem;
    font-family: inherit;
    transition: border-color .2s;
  }
  .field input:focus {
    outline: none;
    border-color: #3b82f6;
  }
  .btn-login {
    width: 100%;
    background: #1d4ed8;
    color: #eff6ff;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
  }
  .btn-login:hover { opacity: .85; }
  .error-msg {
    background: #2d1515;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    color: #fca5a5;
    padding: 8px 12px;
    font-size: .82rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>DNS Monitor</h1>
  <p>Painel de administração</p>
  <div class="error-msg" id="error-msg"></div>
  <form method="POST" action="/admin/login" id="login-form">
    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    const el = document.getElementById('error-msg');
    el.textContent = 'Credenciais inválidas.';
    el.style.display = 'block';
  }
</script>
</body>
</html>
